apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: kubernetes-mcp-server
    namespace: argocd
spec:
    project: default
    source:
        repoURL: ghcr.io/containers/charts
        chart: kubernetes-mcp-server
        targetRevision: "0.1.0" # pin to a specific version in production
        helm:
            valuesObject:
                ingress:
                    enabled: false # internal only
                rbac:
                    create: true
                    extraClusterRoleBindings:
                        - name: read-only
                          roleRef:
                              name: view
                              external: true
    destination:
        server: https://kubernetes.default.svc
        namespace: mcp-servers
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
